<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeHub — Briefe · Rechnungen · Aufkleber</title>
<style>
/* ============ FONTS (system stack, DSGVO-safe, kein externer Ladevorgang) ============ */
:root{
  --ink:#111418;
  --panel:#1a2027;
  --panel-2:#222b34;
  --line:#2e3a44;
  --petrol:#0f2b32;
  --petrol-2:#14383f;
  --brass:#c9a24b;
  --brass-hi:#e4c878;
  --paper:#ffffff;
  --paper-ink:#1c1c1c;
  --muted:#8593a0;
  --muted-2:#6c7885;
  --ok:#3fa373;
  --warn:#d9803f;
  --danger:#c9524b;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(201,162,75,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(20,56,63,.6), transparent 60%),
    var(--ink);
  color:#e7edf2;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* ============ LOGIN ============ */
#lock{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(800px 400px at 50% 20%, rgba(201,162,75,.12), transparent 60%),
    linear-gradient(160deg,#0c1013,#141b21);
}
.lockcard{
  width:min(420px,92vw);
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);
  border-radius:16px;
  padding:38px 34px 30px;
  box-shadow:0 40px 80px -30px rgba(0,0,0,.7);
}
.lockmark{
  display:flex;align-items:center;gap:12px;margin-bottom:26px;
}
.lockmark .glyph{
  width:44px;height:44px;border-radius:11px;
  background:linear-gradient(150deg,var(--brass-hi),var(--brass));
  display:grid;place-items:center;color:#20170a;font-weight:800;font-size:20px;
  box-shadow:0 10px 24px -8px rgba(201,162,75,.6);
}
.lockmark h1{font-size:19px;letter-spacing:.3px;font-weight:700}
.lockmark p{font-size:12px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
#lock label{display:block;font-size:12px;color:var(--muted);margin:0 0 8px 2px;letter-spacing:.3px}
#lock input{
  width:100%;padding:13px 15px;border-radius:10px;
  border:1px solid var(--line);background:#10161b;color:#fff;font-size:15px;
  outline:none;transition:border-color .15s;
}
#lock input:focus{border-color:var(--brass)}
#lock .btn{
  margin-top:18px;width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(150deg,var(--brass-hi),var(--brass));color:#20170a;
  font-weight:700;font-size:15px;letter-spacing:.3px;
}
#lock .hint{margin-top:16px;font-size:11.5px;color:var(--muted-2);text-align:center;line-height:1.6}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

/* ============ APP SHELL ============ */
#app{display:none;min-height:100vh;grid-template-columns:236px 1fr}
.side{
  background:linear-gradient(180deg,#131920,#0f141a);
  border-right:1px solid var(--line);
  padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:11px;padding:0 6px 22px;border-bottom:1px solid var(--line);margin-bottom:16px}
.brand .glyph{width:38px;height:38px;border-radius:10px;background:linear-gradient(150deg,var(--brass-hi),var(--brass));display:grid;place-items:center;color:#20170a;font-weight:800;font-size:17px}
.brand b{font-size:16px;letter-spacing:.3px}
.brand span{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.nav{display:flex;flex-direction:column;gap:4px}
.nav button{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  padding:11px 13px;border:none;background:transparent;color:#c2ccd6;
  border-radius:9px;font-size:14px;font-weight:500;transition:.13s;
}
.nav button .ic{width:20px;text-align:center;font-size:15px;opacity:.85}
.nav button:hover{background:#1b232c;color:#fff}
.nav button.on{background:linear-gradient(150deg,var(--petrol-2),var(--petrol));color:#fff;box-shadow:inset 0 0 0 1px var(--line)}
.nav button.on .ic{opacity:1;color:var(--brass-hi)}
.sidefoot{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--muted-2)}
.sidefoot button{background:none;border:none;color:var(--muted);font-size:12px;padding:6px 0;text-decoration:underline}

.main{padding:0;overflow-x:hidden}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;border-bottom:1px solid var(--line);
  background:rgba(16,22,27,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;
}
.topbar h2{font-size:20px;font-weight:700;letter-spacing:.2px}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.topbar .actions{display:flex;gap:10px}
.view{padding:28px 32px 80px;max-width:1180px}

/* ============ GENERIC UI ============ */
.btn{padding:10px 16px;border:1px solid var(--line);background:var(--panel-2);color:#e7edf2;border-radius:9px;font-size:13.5px;font-weight:600;transition:.13s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{border-color:#3d4b57;background:#28323c}
.btn.primary{background:linear-gradient(150deg,var(--brass-hi),var(--brass));color:#20170a;border-color:transparent}
.btn.primary:hover{filter:brightness(1.05)}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.danger{color:#f0b3ae;border-color:#5a2f2c}
.btn.danger:hover{background:#3a1f1d}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.card h3{font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--brass-hi);margin-bottom:16px;font-weight:700}
.field{margin-bottom:13px}
.field.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;letter-spacing:.3px}
.field input,.field textarea,.field select{
  width:100%;padding:10px 12px;border:1px solid var(--line);background:#10161b;
  color:#fff;border-radius:8px;font-size:13.5px;outline:none;transition:border-color .13s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--brass)}
.field textarea{resize:vertical;min-height:90px;line-height:1.55}
.split{display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:26px;align-items:start}
@media(max-width:1100px){.split{grid-template-columns:1fr}}

.previewwrap{position:sticky;top:96px}
.preview-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.preview-toolbar span{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.paper-shell{background:#39424c;border:1px solid var(--line);border-radius:12px;padding:20px;overflow:auto;max-height:80vh;scroll-behavior:smooth}
.paper-stage{position:relative;margin:0 auto;transition:width .35s ease,height .35s ease}
.paper-stage>div{transform-origin:top left;transition:transform .35s ease}
.zoomchip{font-size:11px;color:var(--muted);background:#10161b;border:1px solid var(--line);border-radius:20px;padding:3px 10px}
.focus-flash{outline:2px solid var(--brass);outline-offset:2px;animation:focusfade 1.1s ease forwards}
@keyframes focusfade{0%{outline-color:var(--brass)}100%{outline-color:transparent}}

/* ============ PAPER / DIN A4 ============ */
.a4{
  background:var(--paper);color:var(--paper-ink);
  width:210mm;min-height:297mm;padding:20mm 20mm 16mm;
  margin:0 auto;font-family:var(--font);font-size:11pt;line-height:1.5;
  box-shadow:0 20px 60px -20px rgba(0,0,0,.6);transform-origin:top center;
}
.a4 *{color:inherit}

/* Brief (DIN 5008) */
.br-head{display:flex;justify-content:space-between;align-items:flex-start;min-height:28mm;margin-bottom:6mm}
.br-logo img{max-height:24mm;max-width:70mm;object-fit:contain}
.br-logo .txtlogo{font-family:var(--serif);font-size:22pt;font-weight:700;letter-spacing:.5px}
.br-sender-r{text-align:right;font-size:9pt;color:#444;line-height:1.5}
.br-sender-r b{font-size:10pt;color:#111}
.br-addr-block{margin-top:2mm}
.br-return{font-size:7.5pt;color:#666;border-bottom:.4pt solid #999;padding-bottom:1mm;margin-bottom:2mm;width:85mm}
.br-recipient{min-height:27mm;font-size:11pt;line-height:1.5}
.br-info{float:right;width:75mm;font-size:9pt;color:#333;margin-top:-24mm;border-left:2pt solid var(--brand-accent,#c9a24b);padding-left:5mm}
.br-info div{display:flex;justify-content:space-between;padding:.4mm 0}
.br-info div span:first-child{color:#777}
.br-date{text-align:right;font-size:10pt;margin:4mm 0 8mm}
.br-subject{font-weight:700;font-size:11.5pt;margin-bottom:5mm}
.br-body{white-space:pre-wrap;font-size:11pt;line-height:1.6;min-height:80mm}
.br-foot{margin-top:auto;border-top:.5pt solid #bbb;padding-top:3mm;font-size:8pt;color:#555;display:flex;justify-content:space-between;gap:8mm}
.br-foot div{flex:1}
.br-foot b{color:#222;display:block;margin-bottom:1mm;font-size:8.5pt}

/* Rechnung */
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10mm}
.inv-logo img{max-height:24mm;max-width:70mm;object-fit:contain}
.inv-logo .txtlogo{font-family:var(--serif);font-size:20pt;font-weight:700}
.inv-company{font-size:8.5pt;color:#555;text-align:right;line-height:1.55}
.inv-company b{font-size:10pt;color:#111;display:block;margin-bottom:1mm}
.inv-title{font-size:20pt;font-weight:700;color:var(--brand-accent,#c9a24b);letter-spacing:.5px}
.inv-meta-row{display:flex;justify-content:space-between;align-items:flex-end;margin:6mm 0 8mm;gap:10mm}
.inv-to{font-size:10.5pt;line-height:1.55}
.inv-to .lbl{font-size:8pt;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1.5mm}
.inv-meta{font-size:9.5pt;text-align:right}
.inv-meta div{display:flex;justify-content:space-between;gap:8mm;padding:.6mm 0}
.inv-meta div span:first-child{color:#888}
table.inv{width:100%;border-collapse:collapse;font-size:9.5pt;margin-bottom:6mm}
table.inv th{background:#f2f3f4;text-align:left;padding:2.4mm 3mm;font-size:8pt;text-transform:uppercase;letter-spacing:.4px;color:#555;border-bottom:1pt solid #ddd}
table.inv th.r,table.inv td.r{text-align:right}
table.inv td{padding:2.6mm 3mm;border-bottom:.4pt solid #e4e4e4;vertical-align:top}
.inv-sum{margin-left:auto;width:78mm;font-size:10pt}
.inv-sum div{display:flex;justify-content:space-between;padding:1.4mm 0}
.inv-sum .tot{border-top:1.4pt solid #333;margin-top:1.5mm;padding-top:2mm;font-weight:700;font-size:12pt}
.inv-note{margin-top:8mm;font-size:9.5pt;line-height:1.6;white-space:pre-wrap}
.inv-pay{margin-top:6mm;background:#f7f7f5;border-left:3pt solid var(--brand-accent,#c9a24b);padding:4mm 5mm;font-size:9pt;line-height:1.6}
.inv-foot{margin-top:8mm;border-top:.5pt solid #bbb;padding-top:3mm;font-size:8pt;color:#555;display:flex;justify-content:space-between;gap:6mm}
.inv-foot b{color:#222;display:block;font-size:8.5pt;margin-bottom:1mm}

/* Ordnerrücken */
.spine-sheet{background:#fff;padding:12mm;width:210mm;min-height:297mm;margin:0 auto;box-shadow:0 20px 60px -20px rgba(0,0,0,.6)}
.spine{display:flex;flex-direction:column;align-items:center;justify-content:space-between;overflow:hidden;color:#111;margin:0 auto 6mm}
.spine .s-top,.spine .s-bot{text-align:center;width:100%}
.spine .s-logo img{max-width:80%;max-height:20mm;object-fit:contain}
.spine .s-logo .txt{font-weight:700;font-size:11pt}
.spine .s-title{font-weight:800;text-align:center;line-height:1.15;word-break:break-word}
.spine .s-sub{text-align:center;color:#444;margin-top:2mm}

/* Register / Trennblätter */
.reg-sheet{background:#fff;width:210mm;height:297mm;margin:0 auto 8mm;box-shadow:0 20px 60px -20px rgba(0,0,0,.6);position:relative;overflow:hidden;color:#111}
.reg-cutframe{position:absolute;inset:6mm;border:.5pt dashed #c4c4c4;pointer-events:none}
/* Deckblatt */
.reg-cover{padding:26mm 22mm}
.reg-cover .rc-title{font-family:var(--serif);font-size:26pt;font-weight:700;letter-spacing:.4px;color:#111;margin-bottom:2mm}
.reg-cover .rc-sub{font-size:11pt;color:#555;margin-bottom:12mm;border-bottom:2pt solid var(--acc,#c9a24b);padding-bottom:5mm;display:inline-block}
.reg-toc{list-style:none;font-size:12.5pt}
.reg-toc li{display:flex;align-items:center;gap:5mm;padding:3.2mm 0;border-bottom:.4pt solid #e2e2e2}
.reg-toc .num{width:11mm;height:11mm;flex:0 0 auto;border-radius:6px;background:var(--acc,#c9a24b);color:#20170a;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:12pt}
.reg-toc .nm{font-weight:600;color:#111}
.reg-cover .rc-foot{position:absolute;bottom:16mm;left:22mm;right:22mm;font-size:8.5pt;color:#888;border-top:.5pt solid #ccc;padding-top:3mm;display:flex;justify-content:space-between}
/* Trennblatt mit gestufter Lasche rechts */
.reg-divider{padding:20mm 22mm}
.reg-divider .rd-big{font-family:var(--serif);font-size:40pt;font-weight:700;color:#eee;position:absolute;left:22mm;top:26mm;line-height:1}
.reg-divider .rd-name{position:absolute;left:22mm;top:64mm;font-size:22pt;font-weight:700;color:#111}
.reg-divider .rd-of{position:absolute;left:22mm;top:80mm;font-size:11pt;color:#777}
.reg-tab{position:absolute;right:0;width:26mm;min-height:20mm;background:var(--acc,#c9a24b);color:#20170a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5mm;
  border-radius:8px 0 0 8px;padding:4mm 3mm;box-shadow:-1pt 0 0 rgba(0,0,0,.08)}
.reg-tab .t-num{font-size:16pt;font-weight:800;line-height:1}
.reg-tab .t-name{font-size:9pt;font-weight:700;text-align:center;line-height:1.15;word-break:break-word}
.reg-tab-cut{position:absolute;right:26mm;top:0;bottom:0;border-left:.5pt dashed #999}
.reg-hint-badge{position:absolute;bottom:14mm;left:22mm;font-size:8pt;color:#999}


.label-sheet{background:#fff;padding:8mm;width:210mm;min-height:297mm;margin:0 auto;box-shadow:0 20px 60px -20px rgba(0,0,0,.6);display:grid;gap:0}
.lbl-cell{border:.4pt dashed #ccc;padding:6mm 7mm;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.lbl-from{font-size:7.5pt;color:#333;border-bottom:.5pt solid #888;padding-bottom:1mm;margin-bottom:2.5mm}
.lbl-to{font-size:11pt;line-height:1.55;font-weight:600;color:#000}
.lbl-to .big{font-weight:800;font-size:12.5pt;color:#000}

/* Chips / lists */
.doclist{display:flex;flex-direction:column;gap:8px}
.docrow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px}
.docrow:hover{border-color:#3d4b57}
.docrow .meta b{font-size:14px}
.docrow .meta span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.docrow .rt{display:flex;gap:6px;align-items:center}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;background:#243039;color:var(--brass-hi);border:1px solid var(--line)}
.badge.paid{background:#173026;color:#6fd6a2;border-color:#245c42}
.badge.open{background:#2e2417;color:#e2b271;border-color:#5c4324}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:42px;margin-bottom:12px;opacity:.5}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#20272e;border:1px solid var(--line);color:#fff;padding:13px 22px;border-radius:11px;font-size:13.5px;box-shadow:0 20px 40px -14px rgba(0,0,0,.6);opacity:0;transition:.28s;z-index:9998}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:#245c42}

.rowline{display:grid;grid-template-columns:1fr 90px 110px 130px 34px;gap:8px;align-items:center;margin-bottom:8px}
.rowline input{padding:9px 10px}
.rowline .del{background:#2a1f1e;border:1px solid #5a2f2c;color:#e79a94;border-radius:8px;height:38px;font-size:16px}
.rowhead{grid-template-columns:1fr 90px 110px 130px 34px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding:0 2px}
.rowhead span:nth-child(n+2){text-align:right}

.seg{display:inline-flex;background:#10161b;border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{padding:7px 13px;border:none;background:transparent;color:var(--muted);border-radius:7px;font-size:12.5px;font-weight:600}
.seg button.on{background:var(--panel-2);color:#fff;box-shadow:inset 0 0 0 1px var(--line)}

.hintbar{font-size:12px;color:var(--muted);background:#151d24;border:1px solid var(--line);border-left:3px solid var(--brass);padding:10px 14px;border-radius:8px;margin-bottom:18px;line-height:1.55}

/* Print */
/* Farben in ALLEN Papier-Elementen exakt drucken (Goldstreifen, Flächen etc.) */
.a4,.spine-sheet,.label-sheet,.a4 *,.spine-sheet *,.label-sheet *{
  -webkit-print-color-adjust:exact !important;
  print-color-adjust:exact !important;
}
/* Druck läuft über printDoc() in einem sauberen neuen Fenster.
   Diese Regeln sind ein Fallback, falls direkt Strg+P gedrückt wird. */
@media print{
  @page{margin:0;size:A4}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .noprint{display:none !important}
  .paper-shell{background:none;border:none;padding:0;max-height:none;overflow:visible}
  .previewwrap{position:static}
  .a4,.spine-sheet,.label-sheet{box-shadow:none;margin:0 auto}
}
@media(max-width:820px){
  #app{grid-template-columns:1fr}
  .side{position:static;height:auto;display:flex;flex-wrap:wrap;gap:6px}
  .nav{flex-direction:row;flex-wrap:wrap}
  .brand{width:100%}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="lock">
  <div class="lockcard" id="lockcard">
    <div class="lockmark">
      <div class="glyph">O</div>
      <div>
        <h1>OfficeHub</h1>
        <p>Zugang geschützt</p>
      </div>
    </div>
    <label for="pw">Passwort</label>
    <input type="password" id="pw" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn" onclick="tryLogin()">Anmelden</button>
    <div class="hint" id="lockhint">Standard-Passwort beim ersten Start: <b>office</b><br>Danach unter „Einstellungen" änderbar.</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <aside class="side">
    <div class="brand">
      <div class="glyph">O</div>
      <div><b>OfficeHub</b><span>Büro-Werkzeuge</span></div>
    </div>
    <nav class="nav" id="nav">
      <button data-v="brief" class="on"><span class="ic">✉️</span>Brief</button>
      <button data-v="rechnung"><span class="ic">🧾</span>Rechnung</button>
      <button data-v="ruecken"><span class="ic">📚</span>Ordnerrücken</button>
      <button data-v="register"><span class="ic">🗂️</span>Register / Trennblätter</button>
      <button data-v="aufkleber"><span class="ic">🏷️</span>Adress-Aufkleber</button>
      <button data-v="profile"><span class="ic">🏢</span>Firmenprofile</button>
      <button data-v="settings"><span class="ic">⚙️</span>Einstellungen</button>
    </nav>
    <div class="sidefoot">
      <button onclick="lockNow()">🔒 Sperren</button>
      <div style="margin-top:8px">Alle Daten liegen lokal in diesem Browser.</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar noprint">
      <div>
        <h2 id="viewTitle">Brief erstellen</h2>
        <div class="sub" id="viewSub">DIN-5008-konform · direkt druckfertig</div>
      </div>
      <div class="actions" id="viewActions"></div>
    </div>
    <div class="view" id="view"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ==================================================================
   OfficeHub — reine Client-App. Speicher: localStorage.
   ================================================================== */
const LS = {
  get:(k,d)=>{try{return JSON.parse(localStorage.getItem('oh_'+k))??d}catch(e){return d}},
  set:(k,v)=>localStorage.setItem('oh_'+k,JSON.stringify(v)),
};
let DB = {
  pw:       LS.get('pw','office'),
  profiles: LS.get('profiles',[]),
  activeProfile: LS.get('activeProfile',null),
  invoices: LS.get('invoices',[]),
  invCounter: LS.get('invCounter',1),
  invPrefix: LS.get('invPrefix','RE-'+new Date().getFullYear()+'-'),
  letters:  LS.get('letters',[]),
};
function save(k){LS.set(k,DB[k])}
function saveAll(){['pw','profiles','activeProfile','invoices','invCounter','invPrefix','letters'].forEach(save)}

/* ---------- Toast ---------- */
let toastT;
function toast(msg,ok){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(ok?' ok':'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2200);
}

/* ---------- Login ---------- */
function tryLogin(){
  const v=document.getElementById('pw').value;
  if(v===DB.pw){
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='grid';
    sessionStorage.setItem('oh_unlocked','1');
    render();
  }else{
    const c=document.getElementById('lockcard');
    c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');
    document.getElementById('lockhint').innerHTML='<span style="color:#e79a94">Falsches Passwort.</span>';
    document.getElementById('pw').select();
  }
}
function lockNow(){sessionStorage.removeItem('oh_unlocked');location.reload()}
if(sessionStorage.getItem('oh_unlocked')==='1'){
  window.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='grid';
    render();
  });
}

/* ---------- Helpers ---------- */
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const nl2 = s => esc(s).replace(/\n/g,'<br>');
const euro = n => (Number(n)||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const todayDE = () => new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const clone = o => (typeof structuredClone==='function') ? structuredClone(o) : JSON.parse(JSON.stringify(o));
function activeProfile(){return DB.profiles.find(p=>p.id===DB.activeProfile)||DB.profiles[0]||null}

/* ---------- Router ---------- */
let currentView='brief';
const VIEWS={
  brief:{t:'Brief erstellen',s:'DIN-5008-konform · direkt druckfertig'},
  rechnung:{t:'Rechnung',s:'Fortlaufende Nummern · lokal gespeichert'},
  ruecken:{t:'Ordnerrücken',s:'Beschriften, drucken, ausschneiden, einstecken'},
  register:{t:'Register / Trennblätter',s:'Deckblatt + gestufte Reiter zum Ausschneiden'},
  aufkleber:{t:'Adress-Aufkleber',s:'Absender & Empfänger übernehmen · sofort drucken'},
  profile:{t:'Firmenprofile',s:'Logo & Stammdaten für Briefe und Rechnungen'},
  settings:{t:'Einstellungen',s:'Passwort, Nummernkreis, Datensicherung'},
};
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button[data-v]');if(!b)return;
  currentView=b.dataset.v;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
function render(){
  const v=VIEWS[currentView];
  document.getElementById('viewTitle').textContent=v.t;
  document.getElementById('viewSub').textContent=v.s;
  document.getElementById('viewActions').innerHTML='';
  const el=document.getElementById('view');
  el.innerHTML='';
  ({brief:renderBrief,rechnung:renderRechnung,ruecken:renderRuecken,register:renderRegister,
    aufkleber:renderAufkleber,profile:renderProfile,settings:renderSettings}[currentView])();
}
/* ==================================================================
   FIRMENPROFILE
   ================================================================== */
function blankProfile(){return{
  id:uid(),type:'business',name:'',logo:'',useTextLogo:true,accent:'#c9a24b',
  street:'',zip:'',city:'',phone:'',email:'',web:'',
  ceo:'',register:'',ustid:'',taxno:'',
  bankName:'',iban:'',bic:''
};}
function renderProfile(){
  const el=document.getElementById('view');
  document.getElementById('viewActions').innerHTML=
    `<button class="btn primary" onclick="newProfile()">+ Neues Profil</button>`;
  if(!DB.profiles.length){
    el.innerHTML=`<div class="empty"><div class="big">🏢</div>
      <p>Noch kein Firmenprofil angelegt.</p>
      <p style="margin-top:6px;font-size:13px">Ein Profil enthält Logo, Adresse, Bankverbindung und Rechtsangaben —<br>diese werden automatisch in Briefe und Rechnungen übernommen.</p>
      <button class="btn primary" style="margin-top:20px" onclick="newProfile()">Erstes Profil anlegen</button></div>`;
    return;
  }
  let html=`<div class="hintbar">Das <b>aktive Profil</b> wird für neue Briefe & Rechnungen vorausgefüllt. Für private Post kannst du auch ein Profil mit deinem Namen statt Firma anlegen.</div>`;
  html+='<div class="grid2">';
  DB.profiles.forEach(p=>{
    const on=p.id===DB.activeProfile||(!DB.activeProfile&&p===DB.profiles[0]);
    html+=`<div class="card" style="${on?'border-color:'+p.accent:''}">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:12px">
          ${p.logo&&!p.useTextLogo?`<img src="${p.logo}" style="height:34px;max-width:90px;object-fit:contain;background:#fff;border-radius:6px;padding:3px">`
            :`<div style="width:34px;height:34px;border-radius:8px;background:${p.accent};display:grid;place-items:center;color:#20170a;font-weight:800">${esc((p.name||'?')[0])}</div>`}
          <div><b style="font-size:15px">${esc(p.name||'Ohne Name')}</b>
          <span style="display:block;font-size:12px;color:var(--muted)">${p.type==='private'?'👤 Privat':'🏢 Geschäftlich'}${p.city?' · '+esc(p.city):''}</span></div>
        </div>
        ${on?'<span class="badge">aktiv</span>':''}
      </div>
      <div style="font-size:12.5px;color:var(--muted);line-height:1.7">
        ${p.street?esc(p.street)+'<br>':''}${p.zip||p.city?esc(p.zip+' '+p.city):''}
        ${p.email?'<br>'+esc(p.email):''}${p.iban?'<br>IBAN: '+esc(p.iban):''}
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        ${on?'':`<button class="btn sm" onclick="setActive('${p.id}')">Aktiv setzen</button>`}
        <button class="btn sm" onclick="editProfile('${p.id}')">Bearbeiten</button>
        <button class="btn sm danger" onclick="delProfile('${p.id}')">Löschen</button>
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
function setActive(id){DB.activeProfile=id;save('activeProfile');toast('Aktives Profil gesetzt',1);render()}
function delProfile(id){if(!confirm('Profil wirklich löschen?'))return;DB.profiles=DB.profiles.filter(p=>p.id!==id);if(DB.activeProfile===id)DB.activeProfile=DB.profiles[0]?.id||null;save('profiles');save('activeProfile');render()}
function newProfile(){openProfileForm(blankProfile(),true)}
function editProfile(id){openProfileForm(clone(DB.profiles.find(p=>p.id===id)),false)}
function openProfileForm(p,isNew){
  const el=document.getElementById('view');
  document.getElementById('viewActions').innerHTML='';
  const isPriv=p.type==='private';
  el.innerHTML=`<div style="max-width:760px">
    <div class="card">
      <h3>Art des Profils</h3>
      <div class="seg" id="pf_typeseg">
        <button type="button" class="${!isPriv?'on':''}" onclick="pfSetType('business')">🏢 Geschäftlich</button>
        <button type="button" class="${isPriv?'on':''}" onclick="pfSetType('private')">👤 Privat</button>
      </div>
      <div class="hintbar" style="margin-top:12px" id="pf_typehint">${isPriv
        ? 'Privates Profil: nur Name, Adresse und Kontakt. Kein Logo, keine Website, keine Bank- oder Steuerangaben — trotzdem sauberes, professionelles Layout.'
        : 'Geschäftliches Profil: mit Logo, Website, Bankverbindung und Rechtsangaben für Rechnungen.'}</div>
      <input type="hidden" id="pf_type" value="${isPriv?'private':'business'}">
    </div>
    <div class="card" style="margin-top:16px">
      <h3>Stammdaten</h3>
      <div class="field"><label id="pf_namelbl">${isPriv?'Vor- und Nachname':'Firmen- / Absendername'}</label><input id="pf_name" value="${esc(p.name)}" placeholder="${isPriv?'Max Mustermann':'M.H. Immobilien'}"></div>
      <div class="field row"><div><label>Straße & Nr.</label><input id="pf_street" value="${esc(p.street)}"></div>
        <div class="field row" style="margin:0"><div><label>PLZ</label><input id="pf_zip" value="${esc(p.zip)}"></div><div><label>Ort</label><input id="pf_city" value="${esc(p.city)}"></div></div></div>
      <div class="field row"><div><label>Telefon</label><input id="pf_phone" value="${esc(p.phone)}"></div><div><label>E-Mail</label><input id="pf_email" value="${esc(p.email)}"></div></div>
      <div class="field pf-biz"><label>Website</label><input id="pf_web" value="${esc(p.web)}" placeholder="www.mhimmobilien.com"></div>
    </div>
    <div class="card pf-biz" style="margin-top:16px">
      <h3>Logo & Farbe</h3>
      <div class="field"><label>Logo hochladen (PNG/JPG/SVG)</label><input type="file" id="pf_logofile" accept="image/*" onchange="pfLogo(this)"></div>
      <div id="pf_logoprev" style="margin:6px 0 12px">${p.logo?`<img src="${p.logo}" style="height:44px;background:#fff;padding:4px;border-radius:6px">`:'<span style="color:var(--muted);font-size:12px">Kein Logo — es wird der Name als Text-Logo verwendet.</span>'}</div>
      <div class="field"><label><input type="checkbox" id="pf_usetext" ${p.useTextLogo?'checked':''} style="width:auto;margin-right:6px"> Namen als Text-Logo verwenden (statt Bild)</label></div>
      <div class="field row"><div><label>Akzentfarbe</label><input type="color" id="pf_accent" value="${p.accent}" style="height:42px"></div><div></div></div>
    </div>
    <div class="card pf-biz" style="margin-top:16px">
      <h3>Rechtsangaben & Bank (für Rechnungen)</h3>
      <div class="field row"><div><label>Inhaber / Geschäftsführer</label><input id="pf_ceo" value="${esc(p.ceo)}"></div><div><label>Handelsregister</label><input id="pf_register" value="${esc(p.register)}" placeholder="HRB 12345"></div></div>
      <div class="field row"><div><label>USt-IdNr.</label><input id="pf_ustid" value="${esc(p.ustid)}" placeholder="DE123456789"></div><div><label>Steuernummer</label><input id="pf_taxno" value="${esc(p.taxno)}"></div></div>
      <div class="field"><label>Bank</label><input id="pf_bankName" value="${esc(p.bankName)}"></div>
      <div class="field row"><div><label>IBAN</label><input id="pf_iban" value="${esc(p.iban)}"></div><div><label>BIC</label><input id="pf_bic" value="${esc(p.bic)}"></div></div>
    </div>
    <div class="card pf-priv" style="margin-top:16px">
      <h3>Farbe</h3>
      <div class="field row"><div><label>Akzentfarbe (Linien & Betonung)</label><input type="color" id="pf_accent_priv" value="${p.accent}" style="height:42px"></div><div></div></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn primary" onclick="saveProfile('${p.id}',${isNew})">Speichern</button>
      <button class="btn ghost" onclick="currentView='profile';render()">Abbrechen</button>
    </div>
  </div>`;
  el._logoData=p.logo;
  pfApplyType(isPriv?'private':'business');
}
function pfSetType(t){
  document.getElementById('pf_type').value=t;
  document.querySelectorAll('#pf_typeseg button').forEach((b,i)=>b.classList.toggle('on',(i===0)===(t==='business')));
  const priv=t==='private';
  document.getElementById('pf_typehint').textContent=priv
    ? 'Privates Profil: nur Name, Adresse und Kontakt. Kein Logo, keine Website, keine Bank- oder Steuerangaben — trotzdem sauberes, professionelles Layout.'
    : 'Geschäftliches Profil: mit Logo, Website, Bankverbindung und Rechtsangaben für Rechnungen.';
  document.getElementById('pf_namelbl').textContent=priv?'Vor- und Nachname':'Firmen- / Absendername';
  pfApplyType(t);
}
function pfApplyType(t){
  const priv=t==='private';
  document.querySelectorAll('.pf-biz').forEach(e=>e.style.display=priv?'none':'');
  document.querySelectorAll('.pf-priv').forEach(e=>e.style.display=priv?'':'none');
}
function pfLogo(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{document.getElementById('view')._logoData=e.target.result;
    document.getElementById('pf_logoprev').innerHTML=`<img src="${e.target.result}" style="height:44px;background:#fff;padding:4px;border-radius:6px">`;
    document.getElementById('pf_usetext').checked=false;};
  r.readAsDataURL(f);
}
function saveProfile(id,isNew){
  const g=x=>document.getElementById('pf_'+x);
  const type=g('type').value;
  const priv=type==='private';
  const p={id,type,name:g('name').value.trim(),
    logo:priv?'':(document.getElementById('view')._logoData||''),
    useTextLogo:priv?true:g('usetext').checked,
    accent:priv?g('accent_priv').value:g('accent').value,
    street:g('street').value.trim(),zip:g('zip').value.trim(),city:g('city').value.trim(),
    phone:g('phone').value.trim(),email:g('email').value.trim(),
    web:priv?'':g('web').value.trim(),
    ceo:priv?'':g('ceo').value.trim(),register:priv?'':g('register').value.trim(),
    ustid:priv?'':g('ustid').value.trim(),taxno:priv?'':g('taxno').value.trim(),
    bankName:priv?'':g('bankName').value.trim(),iban:priv?'':g('iban').value.trim(),bic:priv?'':g('bic').value.trim()};
  if(!p.name){toast('Bitte einen Namen eingeben');return}
  if(isNew){DB.profiles.push(p);if(!DB.activeProfile)DB.activeProfile=p.id}
  else{const i=DB.profiles.findIndex(x=>x.id===id);DB.profiles[i]=p}
  save('profiles');save('activeProfile');toast('Profil gespeichert',1);currentView='profile';render();
}
/* ==================================================================
   BRIEF (DIN 5008)
   ================================================================== */
let briefState={
  recipient:'', subject:'', body:'', date:todayDE(),
  ref:'', yourRef:'', showInfoBlock:true, showHeader:null
};
function renderBrief(){
  const el=document.getElementById('view');
  const p=activeProfile();
  document.getElementById('viewActions').innerHTML=
    `<button class="btn" onclick="saveLetter()">💾 Speichern</button>
     <button class="btn primary" onclick="printDoc('briefPaper')">🖨️ Drucken / PDF</button>`;
  if(!p){el.innerHTML=noProfileMsg('Brief');return}
  // Standard für Briefkopf: Firma zeigt Kopf, privat nicht — bis der Nutzer selbst wählt
  if(briefState.showHeader===null) briefState.showHeader = (p.type!=='private');
  el.innerHTML=`
  <div class="split">
    <div class="panel-col">
      <div class="card">
        <h3>Empfänger</h3>
        <div class="field"><label>Anschrift (Name, Straße, PLZ Ort — je Zeile)</label>
          <textarea id="b_rec" data-focus="recipient" placeholder="Frau\nErika Mustermann\nMusterstraße 12\n67059 Ludwigshafen">${esc(briefState.recipient)}</textarea></div>
      </div>
      <div class="card" style="margin-top:14px">
        <h3>Inhalt</h3>
        <div class="field row"><div><label>Datum</label><input id="b_date" data-focus="date" value="${esc(briefState.date)}"></div>
          <div><label>Betreff-Zeile</label><input id="b_subject" data-focus="subject" value="${esc(briefState.subject)}" placeholder="Ihre Anfrage vom …"></div></div>
        <div class="field row"><div><label>Ihr Zeichen</label><input id="b_yref" data-focus="info" value="${esc(briefState.yourRef)}" placeholder="—"></div>
          <div><label>Unser Zeichen</label><input id="b_ref" data-focus="info" value="${esc(briefState.ref)}" placeholder="—"></div></div>
        <div class="field"><label>Brieftext</label>
          <textarea id="b_body" data-focus="body" style="min-height:200px" placeholder="Sehr geehrte Frau Mustermann,\n\n…\n\nMit freundlichen Grüßen">${esc(briefState.body)}</textarea></div>
        <div class="field"><label><input type="checkbox" id="b_header" ${briefState.showHeader?'checked':''} style="width:auto;margin-right:6px"> Briefkopf oben anzeigen (Logo bzw. Firmenname)</label></div>
        <div class="field"><label><input type="checkbox" id="b_info" ${briefState.showInfoBlock?'checked':''} style="width:auto;margin-right:6px"> Info-Block (Tel./E-Mail/Web) rechts anzeigen</label></div>
      </div>
      <div class="hintbar" style="margin-top:14px">📮 <b>Aufkleber-Position:</b> Bei DIN-lang-Umschlägen klebt der Adressaufkleber ins <b>linke obere Drittel</b> der Vorderseite (ca. 40 mm von oben, 20 mm von links) — dort, wo bei Fensterumschlägen das Sichtfenster sitzt. <b>Nicht</b> unten rechts: dort ist die Frankierzone für die Briefmarke.</div>
    </div>
    <div class="previewwrap">
      <div class="preview-toolbar noprint"><span>Vorschau · DIN A4</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="zoomchip" id="zoomchip_briefPaper">Ganzes Blatt</span>
          <button class="btn sm" onclick="preview_reset('briefPaper')">Ganzes Blatt</button>
        </div></div>
      <div class="paper-shell"><div class="paper-stage"><div id="briefPaper"></div></div></div>
    </div>
  </div>`;
  ['b_rec','b_date','b_subject','b_yref','b_ref','b_body'].forEach(id=>
    el.querySelector('#'+id).addEventListener('input',syncBrief));
  el.querySelector('#b_info').addEventListener('change',syncBrief);
  el.querySelector('#b_header').addEventListener('change',syncBrief);
  drawBrief();
  wireFocusZoom('briefPaper');
}
function syncBrief(){
  briefState.recipient=document.getElementById('b_rec').value;
  briefState.date=document.getElementById('b_date').value;
  briefState.subject=document.getElementById('b_subject').value;
  briefState.yourRef=document.getElementById('b_yref').value;
  briefState.ref=document.getElementById('b_ref').value;
  briefState.body=document.getElementById('b_body').value;
  briefState.showInfoBlock=document.getElementById('b_info').checked;
  briefState.showHeader=document.getElementById('b_header').checked;
  drawBrief();
}
function logoBlock(p,cls){
  if(p.logo&&!p.useTextLogo)return `<div class="${cls}"><img src="${p.logo}"></div>`;
  return `<div class="${cls}"><div class="txtlogo">${esc(p.name)}</div></div>`;
}
function drawBrief(){
  const p=activeProfile();const s=briefState;
  const senderLine=[p.name,p.street,(p.zip+' '+p.city).trim()].filter(Boolean).join(' · ');
  const info=s.showInfoBlock?`<div class="br-info">
      ${p.phone?`<div><span>Telefon</span><span>${esc(p.phone)}</span></div>`:''}
      ${p.email?`<div><span>E-Mail</span><span>${esc(p.email)}</span></div>`:''}
      ${p.web?`<div><span>Web</span><span>${esc(p.web)}</span></div>`:''}
      ${s.ref?`<div><span>Unser Zeichen</span><span>${esc(s.ref)}</span></div>`:''}
      ${s.yourRef?`<div><span>Ihr Zeichen</span><span>${esc(s.yourRef)}</span></div>`:''}
    </div>`:'';

  <div class="a4" style="--brand-accent:${p.accent};display:flex;flex-direction:column">
    ${s.showHeader?`<div class="br-head">
      ${logoBlock(p,'br-logo')}
      <div class="br-sender-r"><b>${esc(p.name)}</b><br>${esc(p.street)}<br>${esc(p.zip+' '+p.city)}</div>
    </div>`:'<div style="height:8mm"></div>'}
    <div class="br-addr-block" data-region="recipient">
      <div class="br-return">${esc(senderLine)}</div>
      <div class="br-recipient">${nl2(s.recipient)||'<span style="color:#bbb">Empfängeranschrift…</span>'}</div>
    </div>
    <div data-region="info">${info}</div>
    <div class="br-date" data-region="date">${esc(p.city?p.city+', den ':'')}${esc(s.date)}</div>
    ${s.subject?`<div class="br-subject" data-region="subject">${esc(s.subject)}</div>`:'<div data-region="subject"></div>'}
    <div class="br-body" data-region="body">${nl2(s.body)||'<span style="color:#bbb">Brieftext…</span>'}</div>
    <div class="br-foot">
      <div><b>${esc(p.name)}</b>${p.ceo?esc(p.ceo)+'<br>':''}${esc(p.street)}<br>${esc(p.zip+' '+p.city)}</div>
      <div><b>Kontakt</b>${p.phone?'Tel. '+esc(p.phone)+'<br>':''}${esc(p.email)}<br>${esc(p.web)}</div>
      ${(p.ustid||p.register)?`<div><b>Register</b>${p.register?esc(p.register)+'<br>':''}${p.ustid?'USt-IdNr. '+esc(p.ustid):''}</div>`:''}
    </div>
  </div>`;
  reapplyScale('briefPaper');
}
/* nach jedem Redraw die zuletzt gewählte Skalierung erneut anwenden (kein Springen) */
function reapplyScale(id){
  const doc=paperDoc(id);if(!doc)return;
  const prev=doc.parentElement&&doc.parentElement._lastScale;
  if(prev){applyScale(id,prev)}
}
function saveLetter(){
  syncBrief();
  const rec=(briefState.recipient.split('\n').filter(Boolean).slice(0,2).join(', '))||'Ohne Empfänger';
  DB.letters.unshift({id:uid(),date:new Date().toISOString(),rec,subject:briefState.subject,state:clone(briefState),profile:DB.activeProfile});
  save('letters');toast('Brief gespeichert',1);
}

function renderRechnung(){

  document.getElementById('inv_tab_new')?.classList.toggle('on',which==='new');
  document.getElementById('inv_tab_list')?.classList.toggle('on',which==='list');

function drawInvItems(){
  const box=document.getElementById('i_items');
  box.innerHTML=invState.items.map((it,i)=>`
    <div class="rowline">
      <input value="${esc(it.desc)}" placeholder="Leistung / Artikel" oninput="invEdit(${i},'desc',this.value)">

      <input value="${esc(it.unit)}" oninput="invEdit(${i},'unit',this.value)">
      <input type="number" step="0.01" value="${it.price}" oninput="invEdit(${i},'price',this.value)">

}
function invEdit(i,k,v){invState.items[i][k]=(k==='desc'||k==='unit')?v:parseFloat(v)||0;drawInvoice()}
function invAddItem(){invState.items.push({desc:'',qty:1,unit:'Std.',price:0});drawInvItems();drawInvoice()}
function invDelItem(i){invState.items.splice(i,1);if(!invState.items.length)invAddItem();else{drawInvItems();drawInvoice()}}
function syncInv(){
  invState.number=document.getElementById('i_num').value;
  invState.date=document.getElementById('i_date').value;
  invState.recipient=document.getElementById('i_rec').value;
  invState.vat=parseFloat(document.getElementById('i_vat').value)||0;
  invState.due=parseInt(document.getElementById('i_due').value)||0;
  invState.payTerms=document.getElementById('i_pay').value;
  invState.note=document.getElementById('i_note').value;

}
function invTotals(){
  const net=invState.items.reduce((s,it)=>s+(it.qty*it.price),0);

  return{net,vat,gross:net+vat};
}

    <div class="inv-sum">
      <div><span>Nettobetrag</span><span>${euro(t.net)}</span></div>

    </div>
    ${invState.kleinunternehmer?'<div class="inv-note" style="font-style:italic">Gemäß §19 UStG wird keine Umsatzsteuer berechnet.</div>':''}
    ${invState.note?`<div class="inv-note">${nl2(invState.note)}</div>`:''}
    <div class="inv-pay"><b>Zahlung:</b> ${esc(invState.payTerms)}<br>

      Bitte geben Sie die Rechnungsnummer <b>${esc(invState.number)}</b> als Verwendungszweck an.</div>
    <div class="inv-foot">
      <div><b>${esc(p.name)}</b>${p.ceo?esc(p.ceo)+'<br>':''}${esc(p.street)}, ${esc(p.zip+' '+p.city)}</div>
      <div><b>Kontakt</b>${p.email?esc(p.email)+'<br>':''}${esc(p.web)}</div>
      <div><b>Steuer</b>${p.taxno?'St.-Nr. '+esc(p.taxno)+'<br>':''}${p.ustid?'USt-IdNr. '+esc(p.ustid):''}</div>

}
function commitInvoice(){
  syncInv();
  if(!invState.recipient.trim()){toast('Bitte Empfänger eingeben');return}
  const t=invTotals();
  const wasNew=!invState.committed && invState.number===DB.invPrefix+String(DB.invCounter).padStart(4,'0');
  const rec=DB.invoices.findIndex(x=>x.id===invState.id);
  const saved={...clone(invState),committed:true,gross:t.gross,savedAt:new Date().toISOString(),profile:DB.activeProfile};
  if(rec>=0)DB.invoices[rec]=saved; else DB.invoices.unshift(saved);
  if(wasNew){DB.invCounter++;save('invCounter')}
  save('invoices');
  toast('Rechnung gespeichert',1);
  invState=freshInvoice();
  invTab('new');
}
function renderInvList(){
  const el=document.getElementById('view');
  if(!DB.invoices.length){el.innerHTML=`<div class="empty"><div class="big">🧾</div><p>Noch keine Rechnungen gespeichert.</p></div>`;return}
  el.innerHTML=`<div class="doclist">`+DB.invoices.map(iv=>`

      <div class="meta"><b>${esc(iv.number)}</b><span>${esc((iv.recipient||'').split('\n')[0])} · ${esc(iv.date)} · ${euro(iv.gross)}</span></div>

        <button class="btn sm" onclick="invToggleState('${iv.id}')">${iv.state==='paid'?'↺ offen':'✓ bezahlt'}</button>
        <button class="btn sm" onclick="invOpen('${iv.id}')">Öffnen</button>

      </div></div>`).join('')+`</div>`;
}
function invToggleState(id){const iv=DB.invoices.find(x=>x.id===id);iv.state=iv.state==='paid'?'open':'paid';save('invoices');renderInvList()}
function invOpen(id){invState=clone(DB.invoices.find(x=>x.id===id));document.getElementById('inv_tab_new').classList.add('on');document.getElementById('inv_tab_list').classList.remove('on');invTab('new');toast('Rechnung geladen — „Festschreiben" speichert Änderungen')}
function invDel(id){if(!confirm('Rechnung löschen?'))return;DB.invoices=DB.invoices.filter(x=>x.id!==id);save('invoices');renderInvList()}

function regEditTab(i,v){regState.tabs[i]=v;drawRegister()}
function regAddTab(){regState.tabs.push('Neuer Reiter');drawRegTabs();drawRegister();document.querySelector('.preview-toolbar span').innerHTML=`Vorschau · Deckblatt + ${regState.tabs.length} Trennblätter <span class="zoomchip" id="zoomchip_regPaper" style="margin-left:6px">Ganzes Blatt</span>`}
function regDelTab(i){regState.tabs.splice(i,1);if(!regState.tabs.length)regState.tabs.push('Reiter 1');drawRegTabs();drawRegister()}
function syncReg(){
  regState.title=document.getElementById('rg_title').value;
  regState.sub=document.getElementById('rg_sub').value;
  regState.tabHeight=Math.max(16,Math.min(40,+document.getElementById('rg_tabh').value));
  regState.accent=document.getElementById('rg_accent').value;
  regState.numberStyle=document.getElementById('rg_numstyle').value;
  regState.showCover=document.getElementById('rg_cover').value==='1';
  drawRegTabs();
  drawRegister();

function drawRegister(){
  const s=regState;const p=activeProfile();
  const n=s.tabs.length;
  let sheets='';
  // Deckblatt
  if(s.showCover){
    const toc=s.tabs.map((t,i)=>`<li><span class="num">${regLabel(i)||(i+1)}</span><span class="nm">${esc(t)||'—'}</span></li>`).join('');
    sheets+=`<div class="reg-sheet" style="--acc:${s.accent}">
      <div class="reg-cutframe"></div>
      <div class="reg-cover">
        <div class="rc-title">${esc(s.title)||'Register'}</div>
        <div class="rc-sub">${esc(s.sub)||(p?esc(p.name):'')}</div>
        <ul class="reg-toc">${toc}</ul>
        <div class="rc-foot"><span>${p?esc(p.name):''}</span><span>${esc(todayDE())}</span></div>
      </div>
    </div>`;
  }
  // Trennblätter mit gestufter Lasche
  const px_top=30, px_bot=30; // mm Rand oben/unten für Laschenbereich
  const usable=297-px_top-px_bot;
  s.tabs.forEach((t,i)=>{
    // vertikale Position der Lasche: gleichmäßig verteilt von oben nach unten
    const slot = n>1 ? px_top + (usable-s.tabHeight)*(i/(n-1)) : px_top + (usable-s.tabHeight)/2;
    sheets+=`<div class="reg-sheet" style="--acc:${s.accent}">
      <div class="reg-cutframe"></div>
      <div class="reg-divider">
        <div class="rd-big">${regLabel(i)||''}</div>
        <div class="rd-name">${esc(t)||'—'}</div>
        <div class="rd-of">${s.title?esc(s.title)+' · ':''}Blatt ${i+1} von ${n}</div>
      </div>
      <div class="reg-tab-cut"></div>
      <div class="reg-tab" style="top:${slot}mm;height:${s.tabHeight}mm">
        ${regLabel(i)?`<span class="t-num">${regLabel(i)}</span>`:''}
        <span class="t-name">${esc(t)||''}</span>
      </div>
      <div class="reg-hint-badge">✂ Lasche ausschneiden · schmalen Streifen rechts entfernen</div>
    </div>`;
  });
  document.getElementById('regPaper').innerHTML=sheets;

function pullFromBrief(){
  if(briefState.recipient){labelState.to=briefState.recipient;document.getElementById('l_to').value=briefState.recipient;syncLabel();toast('Empfänger übernommen',1)}
  else toast('Kein Brief-Empfänger vorhanden');
}
function syncLabel(){
  labelState.to=document.getElementById('l_to').value;
  labelState.from=document.getElementById('l_from').value;
  labelState.showFrom=document.getElementById('l_showfrom').checked;
  labelState.cols=Math.max(1,Math.min(3,+document.getElementById('l_cols').value));
  labelState.rows=Math.max(1,Math.min(8,+document.getElementById('l_rows').value));
  labelState.repeat=document.getElementById('l_repeat').checked;
  drawLabel();
}
function drawLabel(){
  const s=labelState;const total=s.cols*s.rows;const n=s.repeat?total:1;
  const toLines=s.to.split('\n').filter(Boolean);
  const cellInner=`
    ${s.showFrom&&s.from?`<div class="lbl-from">${esc(s.from)}</div>`:''}
    <div class="lbl-to">${toLines.map((l,i)=>i===0&&s.bigFirst?`<span class="big">${esc(l)}</span>`:esc(l)).join('<br>')||'<span style="color:#bbb">Empfänger…</span>'}</div>`;
  let cells='';
  for(let i=0;i<total;i++){
    cells+=`<div class="lbl-cell">${i<n?cellInner:''}</div>`;
  }
  document.getElementById('labelPaper').innerHTML=
    `<div class="label-sheet" style="grid-template-columns:repeat(${s.cols},1fr);grid-auto-rows:${(281/s.rows).toFixed(1)}mm">${cells}</div>`;
  reapplyScale('labelPaper');
}

/* ---------- Preview-Engine: Auto-Fit ganzes Blatt + Fokus-Zoom ---------- */
const previewMode={}; // id -> 'fit' | 'focus'
function paperEl(id){return document.getElementById(id)}
function paperDoc(id){const s=paperEl(id);return s?s.querySelector('.a4,.spine-sheet,.label-sheet'):null}
function getShell(id){const el=paperEl(id);return el?el.closest('.paper-shell'):null}
function mmToPx(){const d=document.createElement('div');d.style.cssText='width:100mm;position:absolute;visibility:hidden';document.body.appendChild(d);const px=d.getBoundingClientRect().width/100;d.remove();return px}
/* skaliert das Dokument so, dass es ganz in die Shell passt */
function fitPaper(id){
  const shell=getShell(id),doc=paperDoc(id);if(!shell||!doc)return;
  previewMode[id]='fit';
  const px=mmToPx();
  const docW=210*px, docH=doc.getBoundingClientRect().height/(parseFloat(doc.dataset.scale||1));
  const availW=shell.clientWidth-40, availH=shell.clientHeight-40;
  const scale=Math.min(availW/docW, availH/(297*px), 1);
  applyScale(id,scale);
  shell.scrollTo({top:0,left:0,behavior:'auto'});
  updateZoomChip(id,scale,'Ganzes Blatt');
}
function applyScale(id,scale){
  const doc=paperDoc(id);if(!doc)return;
  const px=mmToPx();
  doc.dataset.scale=scale;
  doc.style.transform='scale('+scale+')';
  // Stage-Größe an skaliertes Dokument anpassen, damit Scrollbereich stimmt
  const stage=doc.parentElement;
  if(stage&&stage.classList.contains('paper-stage')){
    stage._lastScale=scale;
    stage.style.width=(210*px*scale)+'px';
    stage.style.height=(doc.getBoundingClientRect().height)+'px';
  }
}
/* zoomt auf einen benannten Bereich (Element mit data-region im Dokument) */
function focusRegion(id,region){
  const shell=getShell(id),doc=paperDoc(id);if(!shell||!doc||!region)return;
  const target=doc.querySelector('[data-region="'+region+'"]');
  if(!target){return}
  previewMode[id]='focus';
  const px=mmToPx();
  const availW=shell.clientWidth-40;
  // Zielskalierung: Bereich ~ Shell-Breite füllen, gedeckelt
  const targScale=Math.min(Math.max(availW/(210*px), .6), 1.15);
  applyScale(id,targScale);
  // nach dem Skalieren zur Zielposition scrollen
  requestAnimationFrame(()=>{
    const tRect=target.getBoundingClientRect();
    const sRect=shell.getBoundingClientRect();
    const top=shell.scrollTop+(tRect.top-sRect.top)-30;
    shell.scrollTo({top:Math.max(0,top),behavior:'smooth'});
    target.classList.remove('focus-flash');void target.offsetWidth;target.classList.add('focus-flash');
  });
  updateZoomChip(id,targScale,'Bereich');
}
function updateZoomChip(id,scale,label){
  const chip=document.getElementById('zoomchip_'+id);
  if(chip)chip.textContent=label+' · '+Math.round(scale*100)+'%';
}
/* verdrahtet Eingabefelder: focus -> zoom auf zugehörigen Bereich, blur/idle -> zurück zu fit */
function wireFocusZoom(previewId){
  const view=document.getElementById('view');
  view.querySelectorAll('[data-focus]').forEach(inp=>{
    inp.addEventListener('focus',()=>focusRegion(previewId,inp.dataset.focus));
  });
  // "Ganzes Blatt"-Button + initial fit
  requestAnimationFrame(()=>fitPaper(previewId));
  // bei Fenstergröße neu einpassen wenn im fit-Modus
  if(!view._resizeWired){
    view._resizeWired=true;
    window.addEventListener('resize',()=>{const id=view.dataset.pv;if(id&&previewMode[id]==='fit')fitPaper(id)});
  }
  view.dataset.pv=previewId;
}
function preview_reset(id){fitPaper(id)}
function printDoc(id){
  const node=document.getElementById(id);
  if(!node||!node.firstElementChild){toast('Nichts zu drucken');return}
  const w=window.open('','_print','width=900,height=1200');
  const css=[...document.querySelectorAll('style')].map(s=>s.innerHTML).join('\n');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Drucken</title><style>${css}
    html,body{background:#fff;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
    @page{margin:0;size:A4}
    .a4,.spine-sheet,.label-sheet{box-shadow:none !important;margin:0 auto;transform:none !important}
    .a4{transform:none !important}
    </style></head>
    <body>${node.innerHTML}</body></html>`);
  w.document.close();
  setTimeout(()=>{w.focus();w.print();},350);
}

/* boot */
if(!DB.profiles.length){/* first run stays on brief -> shows profile prompt */}
